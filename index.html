<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WC 2026 — Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface2: #1e242c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaed;
    --muted: #6b7280;
    --accent: #e8c84a;
    --accent-dim: rgba(232,200,74,0.12);
    --usa: #4ade80;
    --usa-dim: rgba(74,222,128,0.10);
    --usa-border: rgba(74,222,128,0.35);
    --live: #f87171;
    --live-dim: rgba(248,113,113,0.15);
    --fin: #60a5fa;
    --fox: #1d4ed8;
    --fs1: #166534;
    --r: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,15,18,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border2);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: .5px;
    color: var(--text); text-decoration: none; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-trophy { color: var(--accent); font-size: 18px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #sync-status {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .sync-dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); animation: pulse 1.8s infinite; }
  .sync-dot.ok   { background: var(--usa); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── CONTROLS ── */
  .controls {
    padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 49px; z-index: 40;
  }
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .3px;
    padding: 5px 11px; border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .pill.usa-pill.active { background: var(--usa); border-color: var(--usa); color: #000; }
  .search-wrap { position: relative; flex: 1; min-width: 140px; max-width: 260px; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--r); padding: 6px 10px 6px 30px;
    color: var(--text); font-size: 13px; font-family: 'Barlow', sans-serif;
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 13px; pointer-events: none;
  }
  .count-badge {
    margin-left: auto; font-size: 11px; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: .3px;
    white-space: nowrap;
  }

  /* ── MAIN ── */
  main { padding: 0 0 80px; max-width: 680px; margin: 0 auto; }

  /* ── PHASE HEADER ── */
  .phase-block { padding-top: 20px; }
  .phase-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--accent);
    padding: 0 16px 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .phase-label::after {
    content: ''; flex: 1; height: 1px; background: var(--border2);
  }

  /* ── DAY BLOCK ── */
  .day-block { margin-bottom: 20px; padding: 0 14px; }

  /* Full-width date banner */
  .day-header {
    display: flex; align-items: center;
    margin-bottom: 0;
    background: var(--surface2);
    border-radius: 10px 10px 0 0;
    padding: 10px 14px;
    border: 1px solid var(--border2);
    border-bottom: 2px solid var(--border2);
  }
  .dh-left {
    display: flex; flex-direction: column; gap: 1px; flex: 1;
  }
  .day-header .dh-weekday {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted); line-height: 1;
  }
  .dh-main {
    display: flex; align-items: baseline; gap: 8px;
  }
  .day-header .dh-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 40px; font-weight: 700; letter-spacing: -1.5px;
    color: var(--text); line-height: .95;
  }
  .day-header .dh-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 600; color: var(--text);
    text-transform: uppercase; letter-spacing: .3px; opacity: .55;
  }
  /* Today state */
  .day-header.today { border-color: rgba(232,200,74,0.4); border-bottom-color: rgba(232,200,74,0.4); }
  .day-header.today .dh-date  { color: var(--accent); }
  .day-header.today .dh-month { color: var(--accent); opacity: .7; }
  .day-header.today .dh-weekday { color: var(--accent); opacity: .9; }
  .today-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase;
    background: var(--accent); color: #000;
    padding: 3px 8px; border-radius: 4px;
  }

  /* Cards wrapper — matches share a bordered container */
  .match-stack {
    border: 1px solid var(--border2);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  /* ── MATCH CARD ── */
  .match {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    padding: 11px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: background .12s;
    position: relative;
  }
  .match:last-child { border-bottom: none; }
  .match:hover { background: var(--surface2); }

  /* State: finished */
  .match.finished { opacity: 0.48; }
  .match.finished:hover { opacity: 0.78; background: var(--surface2); }

  /* State: live */
  .match.live-now { background: var(--live-dim); opacity: 1; }
  .match.live-now::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--live);
    animation: live-bar 1.6s ease-in-out infinite;
  }
  @keyframes live-bar { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* State: USA */
  .match.usa { background: var(--usa-dim); opacity: 1; }
  .match.usa::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--usa);
  }
  .match.usa.finished { opacity: 0.48; }
  .match.usa.live-now { background: var(--live-dim); }
  .match.usa.live-now::before { background: var(--live); animation: live-bar 1.6s ease-in-out infinite; }

  /* ── MATCH BODY (left column) ── */
  .m-body { min-width: 0; display: flex; flex-direction: column; gap: 5px; }

  /* Status pill row */
  .m-status-row {
    display: flex; align-items: center; gap: 7px;
    margin-bottom: 1px;
  }
  .m-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .pill-live { background: var(--live); color: #fff; }
  .pill-ft   { background: transparent; color: var(--muted); border: 1px solid rgba(255,255,255,0.12); }
  .pill-usa  { background: var(--usa); color: #000; }
  .m-kickoff {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 500; color: var(--muted);
    letter-spacing: .2px;
  }
  .match.finished .m-kickoff { text-decoration: line-through; opacity: .5; }

  /* ── TEAM ROWS ── */
  .m-team-row {
    display: flex; align-items: center; gap: 8px;
  }
  .m-flag { font-size: 20px; line-height: 1; width: 26px; text-align: center; flex-shrink: 0; }
  .m-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 19px; font-weight: 600; letter-spacing: .2px;
    color: var(--text); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .m-name.tbd-name {
    color: var(--muted); font-weight: 400; font-size: 15px;
  }
  /* Score per team */
  .m-score-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 700; letter-spacing: -.5px;
    color: var(--text); min-width: 22px; text-align: right;
    margin-left: 4px;
  }
  .m-score-val.winner-score { color: #fff; }
  .m-score-val.loser-score  { color: var(--muted); font-weight: 400; }

  /* Divider between teams */
  .m-divider {
    height: 1px; background: var(--border); margin: 1px 0 1px 34px;
  }

  /* Meta row: group + venue */
  .m-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 1px;
  }
  .m-group-tag {
    font-size: 10px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
  }
  .m-venue-tag {
    font-size: 11px; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── MATCH RIGHT (channel) ── */
  .m-right {
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: flex-start; padding-left: 10px; padding-top: 2px;
  }
  .m-ch {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 3px 8px; border-radius: 3px; white-space: nowrap;
  }
  .ch-FOX { background: var(--fox); color: #fff; }
  .ch-FS1 { background: var(--fs1); color: #fff; }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 16px;
    font-size: 11px; color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* ── LOADING SKELETON ── */
  .skeleton-wrap { padding: 16px; }
  .skel {
    height: 72px; border-radius: var(--r);
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── BOTTOM SHEET ── */
  .sheet-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 500px;
    background: #1a1f27;
    border-radius: 18px 18px 0 0;
    padding: 0 0 env(safe-area-inset-bottom,16px);
    overflow: hidden;
    animation: slide-up .22s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,.2);
    margin: 10px auto 0;
  }
  .sheet-match {
    padding: 14px 20px 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .sheet-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .sheet-vs { font-size: 13px; color: var(--muted); font-weight: 400; }
  .sheet-meta {
    font-size: 12px; color: var(--muted); margin-top: 3px;
    font-family: 'Barlow', sans-serif;
  }
  .sheet-actions { padding: 10px 16px 6px; display: flex; flex-direction: column; gap: 8px; }
  .sheet-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    border: none; cursor: pointer; text-align: left; width: 100%;
    text-decoration: none; transition: opacity .12s;
    font-family: 'Barlow', sans-serif;
  }
  .sheet-btn:active { opacity: .75; }
  .sheet-btn-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .sheet-btn-text { display: flex; flex-direction: column; gap: 1px; }
  .sheet-btn-label { font-size: 15px; font-weight: 500; }
  .sheet-btn-sub   { font-size: 12px; opacity: .6; }
  .btn-fox { background: #1e3a6e; }
  .btn-fox .sheet-btn-icon { background: var(--fox); }
  .btn-fox .sheet-btn-label { color: #fff; }
  .btn-fox .sheet-btn-sub { color: rgba(255,255,255,.7); }
  .btn-fs1 { background: #1a3524; }
  .btn-fs1 .sheet-btn-icon { background: var(--fs1); }
  .btn-fs1 .sheet-btn-label { color: #fff; }
  .btn-fs1 .sheet-btn-sub { color: rgba(255,255,255,.7); }
  .btn-web { background: var(--surface2); }
  .btn-web .sheet-btn-icon { background: rgba(255,255,255,.08); }
  .btn-web .sheet-btn-label { color: var(--text); }
  .btn-web .sheet-btn-sub { color: var(--muted); }
  .sheet-cancel {
    margin: 2px 16px 8px; padding: 14px;
    background: var(--surface2); border: none; border-radius: 12px;
    color: var(--muted); font-size: 15px; font-family: 'Barlow', sans-serif;
    font-weight: 500; cursor: pointer; width: calc(100% - 32px);
    transition: opacity .12s;
  }
  .sheet-cancel:active { opacity: .7; }
  .match { cursor: pointer; }

  /* ── RESPONSIVE ── */
  @media (max-width: 380px) {
    .day-block { padding: 0 10px; }
    .day-header .dh-date { font-size: 32px; }
    .day-header .dh-month { font-size: 18px; }
    .m-name { font-size: 16px; }
    .m-score-val { font-size: 20px; }
    .match { padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <span class="logo-trophy">⚽</span>
    WC 2026
  </a>
  <div class="header-right">
    <div id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-label">Loading…</span>
    </div>
  </div>
</header>

<div class="controls">
  <div class="pill-group" id="phase-pills">
    <button class="pill active" data-phase="all">All</button>
    <button class="pill" data-phase="group">Groups</button>
    <button class="pill" data-phase="r32">R32</button>
    <button class="pill" data-phase="r16">R16</button>
    <button class="pill" data-phase="qf">QF</button>
    <button class="pill" data-phase="sf">SF</button>
    <button class="pill" data-phase="final">Final</button>
    <button class="pill usa-pill" data-phase="usa">🇺🇸 USA</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="search" id="search" placeholder="Team or city…" autocomplete="off" autocorrect="off">
  </div>
  <div class="count-badge" id="count-badge"></div>
</div>

<main id="main">
  <div class="skeleton-wrap">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
    <div class="skel"></div><div class="skel"></div>
  </div>
</main>

<footer>
  Data: openfootball/worldcup.json — Times in Pacific (PDT) — Not affiliated with FIFA
</footer>

<script>
// ─────────────────────────────────────────────
// FLAGS
// ─────────────────────────────────────────────
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Korea Republic':'🇰🇷',
  'Czechia':'🇨🇿','Czech Republic':'🇨🇿','Canada':'🇨🇦',
  'Bosnia and Herzegovina':'🇧🇦','Bosnia & Herzegovina':'🇧🇦','Bosnia':'🇧🇦',
  'USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Qatar':'🇶🇦',
  'Switzerland':'🇨🇭','Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹',
  'Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','Australia':'🇦🇺','Turkey':'🇹🇷','Türkiye':'🇹🇷',
  'Germany':'🇩🇪','Curacao':'🇨🇼','Curaçao':'🇨🇼','Netherlands':'🇳🇱',
  'Japan':'🇯🇵','Ivory Coast':'🇨🇮',"Côte d'Ivoire":'🇨🇮','Ecuador':'🇪🇨',
  'Tunisia':'🇹🇳','Sweden':'🇸🇪','Spain':'🇪🇸','Cape Verde':'🇨🇻',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'Iran':'🇮🇷','New Zealand':'🇳🇿','France':'🇫🇷','Senegal':'🇸🇳',
  'Iraq':'🇮🇶','Norway':'🇳🇴','Argentina':'🇦🇷','Algeria':'🇩🇿',
  'Austria':'🇦🇹','Jordan':'🇯🇴','Portugal':'🇵🇹','Congo DR':'🇨🇩',
  'DR Congo':'🇨🇩','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭',
  'Panama':'🇵🇦','Uzbekistan':'🇺🇿','Colombia':'🇨🇴'
};

function flag(name) {
  if (!name || name === 'TBD') return '';
  if (FLAGS[name]) return FLAGS[name];
  for (const k of Object.keys(FLAGS)) {
    if (name.toLowerCase().includes(k.toLowerCase()) || k.toLowerCase().includes(name.toLowerCase()))
      return FLAGS[k];
  }
  return '';
}

// ─────────────────────────────────────────────
// CANONICAL FIXTURE LIST (all 104 matches)
// Keys that openfootball uses to match results
// ─────────────────────────────────────────────
const FIXTURES = [
  // GROUP STAGE
  {id:'g_a1', phase:'group', group:'A', date:'2026-06-11', pdt:'12:00 pm', t1:'Mexico',             t2:'South Africa',         venue:'Mexico City',       ch:'FOX'},
  {id:'g_a2', phase:'group', group:'A', date:'2026-06-11', pdt:'7:00 pm',  t1:'South Korea',         t2:'Czechia',              venue:'Guadalajara',        ch:'FS1'},
  {id:'g_b1', phase:'group', group:'B', date:'2026-06-12', pdt:'12:00 pm', t1:'Canada',              t2:'Bosnia and Herzegovina',venue:'Toronto',           ch:'FOX'},
  {id:'g_d1', phase:'group', group:'D', date:'2026-06-12', pdt:'6:00 pm',  t1:'USA',                 t2:'Paraguay',             venue:'Los Angeles',        ch:'FOX', usa:true},
  {id:'g_b2', phase:'group', group:'B', date:'2026-06-13', pdt:'12:00 pm', t1:'Qatar',               t2:'Switzerland',          venue:'San Francisco Bay',  ch:'FOX'},
  {id:'g_c1', phase:'group', group:'C', date:'2026-06-13', pdt:'3:00 pm',  t1:'Brazil',              t2:'Morocco',              venue:'New York/NJ',        ch:'FS1'},
  {id:'g_c2', phase:'group', group:'C', date:'2026-06-13', pdt:'6:00 pm',  t1:'Haiti',               t2:'Scotland',             venue:'Boston',             ch:'FS1'},
  {id:'g_d2', phase:'group', group:'D', date:'2026-06-13', pdt:'9:00 pm',  t1:'Australia',           t2:'Türkiye',              venue:'Vancouver',          ch:'FOX'},
  {id:'g_e1', phase:'group', group:'E', date:'2026-06-14', pdt:'10:00 am', t1:'Germany',             t2:'Curaçao',              venue:'Houston',            ch:'FOX'},

let scores = {};     // key: "Team1 v Team2 YYYY-MM-DD" -> {score1, score2, winner, status}
let activePhase = 'all';
let searchText   = '';

// ─────────────────────────────────────────────
// OPENFOOTBALL DATA FETCH
// Tries the 2026 worldcup.json; falls back gracefully
// ─────────────────────────────────────────────
const OF_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

function normalizeName(n) {
  if (!n) return '';
  return n.trim()
    .replace(/Türkiye|Turkey/i, 'Türkiye')
    .replace(/Côte d'Ivoire|Ivory Coast/i, 'Ivory Coast')
    .replace(/Bosnia[- &]+Herzegovina/i, 'Bosnia and Herzegovina')
    .replace(/DR Congo|Congo DR/i, 'Congo DR')
    .replace(/Czech Republic/i, 'Czechia')
    .replace(/Korea Republic|South Korea/i, 'South Korea')
    .replace(/Curaçao|Curacao/i, 'Curaçao')
    .replace(/United States|USA/i, 'USA');
}

function scoreKey(t1, t2, date) {
  return `${normalizeName(t1)} v ${normalizeName(t2)} ${date}`;
}

async function fetchScores() {
  setSyncState('loading');
  try {
    const res = await fetch(OF_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    scores = {};
    const allMatches = [];
    if (data.rounds) data.rounds.forEach(r => r.matches && r.matches.forEach(m => allMatches.push(m)));
    else if (data.matches) data.matches.forEach(m => allMatches.push(m));

    allMatches.forEach(m => {
      const date = m.date || '';
      const t1 = normalizeName(m.team1?.name || m.team1 || '');
      const t2 = normalizeName(m.team2?.name || m.team2 || '');
      if (!t1 || !t2 || !date) return;
      const key = scoreKey(t1, t2, date);
      const s = m.score || m.result || {};
      const ft = s.ft || s.score || null;
      if (ft && Array.isArray(ft) && ft.length === 2) {
        const s1 = ft[0], s2 = ft[1];
        let winner = null;
        if (s1 > s2) winner = t1;
        else if (s2 > s1) winner = t2;
        scores[key] = { score1: s1, score2: s2, winner, status: 'FT' };
      }
    });

    setSyncState('ok');
    render();
    return true;
  } catch (e) {
    console.warn('openfootball fetch failed:', e);
    setSyncState('error');
    render();
    return false;
  }
}

function setSyncState(state) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (state === 'loading') { label.textContent = 'Updating…'; }
  else if (state === 'ok') { dot.classList.add('ok'); label.textContent = 'Live data'; }
  else if (state === 'error') { label.textContent = 'Offline'; }
}

function todayPDT() {
  const now = new Date();
  const pdtOffset = -7 * 60;
  const pdt = new Date(now.getTime() + (now.getTimezoneOffset() + pdtOffset) * 60000);
  return pdt.toISOString().slice(0,10);
}

function dayHeaderHtml(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const isToday = dateStr === todayPDT();
  const weekday = d.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
  const day   = d.getDate();
  const month = d.toLocaleDateString('en-US', { month: 'long' }).toUpperCase();
  const cls = isToday ? ' today' : '';
  const chip = isToday ? '<span class="today-chip">Today</span>' : '';
  return `<div class="day-header${cls}">
    <div class="dh-left">
      <span class="dh-weekday">${weekday}</span>
      <div class="dh-main">
        <span class="dh-date">${day}</span>
        <span class="dh-month">${month}</span>
      </div>
    </div>
    ${chip}
  </div>`;
}

function getScore(m) {
  const k = scoreKey(m.t1, m.t2, m.date);
  return scores[k] || null;
}

function isLiveNow(m) {
  const now = new Date();
  const pdtOffset = -7 * 60;
  const nowPDT = new Date(now.getTime() + (now.getTimezoneOffset() + pdtOffset) * 60000);
  const todayStr = nowPDT.toISOString().slice(0,10);
  if (m.date !== todayStr) return false;
  if (getScore(m)) return false;
  const [hr, min] = m.pdt.replace(/ (am|pm)/,'').split(':').map(Number);
  const isPM = m.pdt.includes('pm') && hr !== 12;
  const kickoffH = isPM ? hr + 12 : hr;
  const kickoffMins = kickoffH * 60 + min;
  const nowMins = nowPDT.getHours() * 60 + nowPDT.getMinutes();
  return nowMins >= kickoffMins && nowMins <= kickoffMins + 120;
}

function matchHtml(m) {
  const sc   = getScore(m);
  const live = isLiveNow(m);
  const isTBD = m.t1 === 'TBD' || m.t2 === 'TBD';

  // Row class
  let cls = 'match';
  if (m.usa)  cls += ' usa';
  if (live)   cls += ' live-now';
  if (sc)     cls += ' finished';

  // Status pill
  let pill = '';
  if (live)      pill = `<span class="m-pill pill-live">● LIVE</span>`;
  else if (sc)   pill = `<span class="m-pill pill-ft">FT</span>`;
  else if (m.usa) pill = `<span class="m-pill pill-usa">🇺🇸 USA</span>`;

  const kickoffHtml = `<span class="m-kickoff">${m.pdt} PDT</span>`;

  // Per-team score values
  const f1 = flag(m.t1), f2 = flag(m.t2);
  const flag1 = f1 ? `<span class="m-flag">${f1}</span>` : `<span class="m-flag"></span>`;
  const flag2 = f2 ? `<span class="m-flag">${f2}</span>` : `<span class="m-flag"></span>`;

  let score1Html = '', score2Html = '';
  if (sc) {
    const w1 = sc.winner === m.t1;
    const w2 = sc.winner === m.t2;
    score1Html = `<span class="m-score-val ${w1 ? 'winner-score' : 'loser-score'}">${sc.score1}</span>`;
    score2Html = `<span class="m-score-val ${w2 ? 'winner-score' : 'loser-score'}">${sc.score2}</span>`;
  }

  const name1cls = isTBD && m.t1 === 'TBD' ? ' tbd-name' : '';
  const name2cls = isTBD && m.t2 === 'TBD' ? ' tbd-name' : '';

  const groupTag  = m.group ? `<span class="m-group-tag">Group ${m.group}</span>` : '';
  const venueTag  = `<span class="m-venue-tag">${m.venue}</span>`;

  return `<div class="${cls}" data-id="${m.id}">
    <div class="m-body">
      <div class="m-status-row">${pill}${kickoffHtml}</div>
      <div class="m-team-row">
        ${flag1}
        <span class="m-name${name1cls}">${m.t1}</span>
        ${score1Html}
      </div>
      <div class="m-divider"></div>
      <div class="m-team-row">
        ${flag2}
        <span class="m-name${name2cls}">${m.t2}</span>
        ${score2Html}
      </div>
      <div class="m-meta">${groupTag}${groupTag && venueTag ? '<span style="color:var(--border2)">·</span>' : ''}${venueTag}</div>
    </div>
    <div class="m-right">
      <span class="m-ch ch-${m.ch}">${m.ch}</span>
    </div>
  </div>`;
}

function render() {
  const filtered = FIXTURES.filter(m => {
    if (activePhase === 'usa') return m.usa;
    if (activePhase !== 'all' && m.phase !== activePhase) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      return m.t1.toLowerCase().includes(q) ||
             m.t2.toLowerCase().includes(q) ||
             m.venue.toLowerCase().includes(q) ||
             (m.group||'').toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('count-badge').textContent =
    filtered.length + ' match' + (filtered.length !== 1 ? 'es' : '');

  // Group by phase → date string (for stable sort)
  const byPhase = {};
  filtered.forEach(m => {
    if (!byPhase[m.phase]) byPhase[m.phase] = {};
    if (!byPhase[m.phase][m.date]) byPhase[m.phase][m.date] = [];
    byPhase[m.phase][m.date].push(m);
  });

  let html = '';
  PHASE_ORDER.forEach(ph => {
    if (!byPhase[ph]) return;
    html += `<div class="phase-block"><div class="phase-label">${PHASE_LABELS[ph]}</div>`;
    Object.keys(byPhase[ph]).sort().forEach(date => {
      html += `<div class="day-block">${dayHeaderHtml(date)}<div class="match-stack">`;
      byPhase[ph][date].forEach(m => { html += matchHtml(m); });
      html += '</div></div>';
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">No matches found.</div>';
  document.getElementById('main').innerHTML = html;
}

// ─────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────
document.getElementById('phase-pills').addEventListener('click', e => {
  const btn = e.target.closest('.pill');
  if (!btn) return;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  activePhase = btn.dataset.phase;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchText = e.target.value;
  render();
});

// ─────────────────────────────────────────────
// INIT + AUTO-REFRESH
// ─────────────────────────────────────────────
fetchScores();
// Refresh every 5 minutes
setInterval(fetchScores, 5 * 60 * 1000);
// ─────────────────────────────────────────────
// BOTTOM SHEET — WATCH LINKS
// ─────────────────────────────────────────────
const overlay  = document.getElementById('sheet-overlay');
const sheetEl  = document.getElementById('sheet');
const teamsTxt = document.getElementById('sheet-teams');
const metaTxt  = document.getElementById('sheet-meta');
const actionsEl= document.getElementById('sheet-actions');
const cancelBtn= document.getElementById('sheet-cancel');

// Fox Sports universal link — works on iOS to open the app (or website fallback)
// FS1 content lives inside the same Fox Sports app
const FOX_APP_URL = 'https://www.foxsports.com/live';
const FS1_APP_URL = 'https://www.foxsports.com/live';

function openSheet(m) {
  const f1 = flag(m.t1), f2 = flag(m.t2);
  const team1 = (f1 ? f1 + ' ' : '') + m.t1;
  const team2 = (f2 ? f2 + ' ' : '') + m.t2;

  teamsTxt.innerHTML =
    `<span>${team1}</span><span class="sheet-vs">vs</span><span>${team2}</span>`;

  const sc = getScore(m);
  const scoreStr = sc ? `Final: ${m.t1} ${sc.score1}–${sc.score2} ${m.t2} · ` : '';
  metaTxt.textContent = scoreStr + m.pdt + ' PDT · ' + m.venue;

  // Build action buttons
  const isFox = m.ch === 'FOX';
  const chName = m.ch; // FOX or FS1
  const chColor = isFox ? 'btn-fox' : 'btn-fs1';
  const chIcon  = isFox ? '🦊' : '📺';
  const appUrl  = FOX_APP_URL; // both go to Fox Sports app

  actionsEl.innerHTML = `
    <a href="${appUrl}" class="sheet-btn ${chColor}" target="_blank" rel="noopener">
      <div class="sheet-btn-icon">${chIcon}</div>
      <div class="sheet-btn-text">
        <span class="sheet-btn-label">Open Fox Sports App</span>
        <span class="sheet-btn-sub">Watch on ${chName} · launches app if installed</span>
      </div>
    </a>
    <a href="https://www.foxsports.com/live" class="sheet-btn btn-web" target="_blank" rel="noopener">
      <div class="sheet-btn-icon">🌐</div>
      <div class="sheet-btn-text">
        <span class="sheet-btn-label">Open in Browser</span>
        <span class="sheet-btn-sub">foxsports.com/live</span>
      </div>
    </a>`;

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

cancelBtn.addEventListener('click', closeSheet);
overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheet(); });

// Delegate click on match rows — attach after render
document.getElementById('main').addEventListener('click', e => {
  const row = e.target.closest('.match');
  if (!row) return;
  const id = row.dataset.id;
  if (!id) return;
  const m = FIXTURES.find(f => f.id === id);
  if (m) openSheet(m);
});


</script>
