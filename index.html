<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>WC 2026 — Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --surface: #161a20;
    --surface2: #1e242c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8eaed;
    --muted: #6b7280;
    --accent: #e8c84a;
    --accent-dim: rgba(232,200,74,0.12);
    --usa: #4ade80;
    --usa-dim: rgba(74,222,128,0.10);
    --usa-border: rgba(74,222,128,0.35);
    --live: #f87171;
    --live-dim: rgba(248,113,113,0.15);
    --fin: #60a5fa;
    --fox: #1d4ed8;
    --fs1: #166534;
    --r: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  html, body { overflow: auto; } /* iOS WebKit: never set overflow:hidden on html/body — breaks position:sticky */
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(13,15,18,0.96);
    border-bottom: 1px solid var(--border2);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 20px; letter-spacing: .5px;
    color: var(--text); text-decoration: none; white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  .logo-trophy { color: var(--accent); font-size: 18px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  #sync-status {
    font-size: 11px; color: var(--muted);
    display: flex; align-items: center; gap: 5px;
  }
  .sync-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .sync-dot.live { background: var(--live); box-shadow: 0 0 6px var(--live); animation: pulse 1.8s infinite; }
  .sync-dot.ok   { background: var(--usa); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── CONTROLS ── */
  .controls {
    padding: 10px 16px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: fixed;
    top: 49px; left: 0; right: 0;
    z-index: 40;
  }
  .pill-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .3px;
    padding: 5px 11px; border-radius: 99px;
    border: 1px solid var(--border2);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all .15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--text); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .pill.usa-pill.active { background: var(--usa); border-color: var(--usa); color: #000; }
  .search-wrap { position: relative; flex: 1; min-width: 140px; max-width: 260px; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: var(--r); padding: 6px 10px 6px 30px;
    color: var(--text); font-size: 13px; font-family: 'Barlow', sans-serif;
    outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 13px; pointer-events: none;
  }
  .count-badge {
    margin-left: auto; font-size: 11px; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: .3px;
    white-space: nowrap;
  }

  /* ── MAIN ── */
  main { padding: 106px 0 80px; max-width: 680px; margin: 0 auto; }

  /* ── PHASE HEADER ── */
  .phase-block { padding-top: 28px; }

  /* Phase header — sticky banner that stays visible while scrolling */
  .phase-label {
    margin: 0 14px 0;
    padding: 10px 16px 12px;
    background: linear-gradient(135deg, rgba(22,26,32,0.97) 0%, rgba(24,29,36,0.97) 100%);
    border: 1px solid rgba(232,200,74,0.22);
    border-radius: 10px;
    display: flex; flex-direction: column; gap: 4px;
    position: -webkit-sticky; /* Safari */
    position: sticky;
    top: var(--sticky-phase-top, 98px); /* set dynamically by JS after measuring */
    z-index: 30;
    /* No backdrop-filter on sticky element — breaks iOS WebKit sticky */
    transition: padding .2s, border-radius .2s, box-shadow .2s;
  }
  header::before, .phase-label::before {
    content: '';
    position: absolute; inset: 0; z-index: -1;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    pointer-events: none;
    border-radius: inherit;
  }

  /* When pinned — compact single row */
  .phase-label.is-pinned {
    padding: 7px 16px;
    border-radius: 0;
    border-left: none; border-right: none;
    margin: 0;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    border-color: rgba(232,200,74,0.3);
    flex-direction: row; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .phase-label.is-pinned .phase-label-eyebrow { display: none; }
  .phase-label.is-pinned .phase-label-title { font-size: 20px; }
  .phase-label.is-pinned .phase-label-icon { font-size: 20px; }

  /* Eyebrow spans full width on its own line */
  .phase-label-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
    text-transform: uppercase; color: rgba(232,200,74,0.55);
    line-height: 1; width: 100%;
    transition: all .2s;
  }
  /* Title + icon share the row below eyebrow */
  .phase-label-bottom {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .phase-label-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--accent); line-height: 1;
    text-transform: uppercase;
    transition: font-size .2s;
  }
  .phase-label-icon {
    font-size: 28px; opacity: 0.4; flex-shrink: 0;
    transition: font-size .2s;
  }

  /* ── DAY BLOCK ── */
  .day-block { margin-bottom: 20px; padding: 0 14px; }

  /* Full-width date banner */
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 0;
    background: var(--surface2);
    border-radius: 10px 10px 0 0;
    padding: 15px 14px;
    border: 1px solid var(--border2);
    border-bottom: 1px solid var(--border2);
  }
  /* Single-line date: "JUNE 16 (TUESDAY)" */
  .dh-line {
    display: flex; align-items: baseline; gap: 6px; flex-wrap: nowrap;
  }
  .dh-month {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700; letter-spacing: .5px;
    text-transform: uppercase; color: var(--text); line-height: 1;
  }
  .dh-date {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 700; letter-spacing: .5px;
    color: var(--text); line-height: 1;
  }
  .dh-weekday {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 500; letter-spacing: .3px;
    text-transform: uppercase; color: var(--muted); line-height: 1;
  }
  /* Today state */
  .day-header.today { border-color: rgba(232,200,74,0.4); border-bottom-color: rgba(232,200,74,0.4); }
  .day-header.today .dh-date  { color: var(--accent); }
  .day-header.today .dh-month { color: var(--accent); }
  .day-header.today .dh-weekday { color: rgba(232,200,74,0.65); }
  .today-chip {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; white-space: nowrap;
    background: var(--accent); color: #000;
    padding: 3px 8px; border-radius: 4px;
  }

  /* Cards wrapper — matches share a bordered container */
  /* match-stack is now just a spacing wrapper — no shared border */
  .match-stack {
    display: flex; flex-direction: column; gap: 12px;
    padding-top: 8px;
  }

  /* ── MATCH CARD — each match is its own rounded card ── */
  .match {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 10px;
    transition: background .12s;
    position: relative;
    overflow: hidden; /* keeps left-bar ::before clipped to border-radius */
  }
  .match:hover { background: var(--surface2); }

  /* State: finished */
  .match.finished { opacity: 0.48; }
  .match.finished:hover { opacity: 0.78; background: var(--surface2); }

  /* State: live */
  .match.live-now { background: var(--live-dim); opacity: 1; }
  .match.live-now::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--live);
    animation: live-bar 1.6s ease-in-out infinite;
  }
  @keyframes live-bar { 0%,100%{opacity:1} 50%{opacity:.25} }

  /* State: USA */
  .match.usa { background: var(--usa-dim); border-color: var(--usa-border); opacity: 1; }
  .match.usa::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--usa);
  }
  .match.usa.finished { opacity: 0.48; }
  .match.usa.live-now { background: var(--live-dim); }
  .match.usa.live-now::before { background: var(--live); animation: live-bar 1.6s ease-in-out infinite; }

  /* ── MATCH BODY (left column) ── */
  .m-body { min-width: 0; display: flex; flex-direction: column; gap: 8px; }

  /* ── TOP INFO ROW: time · state · group · venue — all on one line ── */
  .m-info-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: nowrap;
    overflow: hidden;
  }

  /* State chip — always visible regardless of score toggle */
  .m-state {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 7px; border-radius: 3px;
    display: inline-flex; align-items: center; gap: 4px;
    flex-shrink: 0;
  }
  .state-live     { background: var(--live); color: #fff; }
  .state-ft       { background: var(--surface2); color: var(--muted);
                    border: 1px solid rgba(255,255,255,0.15); }
  .state-upcoming { display: none; } /* no chip for upcoming — cleaner */

  /* USA tag */
  .m-pill-usa {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 3px;
    background: var(--usa); color: #000;
    display: inline-flex; align-items: center; flex-shrink: 0;
  }

  /* Kickoff time — larger, more prominent */
  .m-kickoff {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px; font-weight: 600; color: var(--text);
    letter-spacing: .3px; flex-shrink: 0;
  }
  body.show-scores .match.finished .m-kickoff { text-decoration: line-through; opacity: .45; }

  /* Separator dot between info items */
  .m-sep {
    color: var(--border2); font-size: 13px; flex-shrink: 0; line-height: 1;
  }

  /* Group label */
  .m-group-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: .5px;
    text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }

  /* Venue — let it truncate if line gets too long */
  .m-venue-tag {
    font-family: 'Barlow', sans-serif;
    font-size: 13px; font-weight: 400; color: var(--muted);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }

  /* ── TEAM ROWS ── */
  .m-team-row {
    display: flex; align-items: center; gap: 8px;
  }
  .m-flag { font-size: 20px; line-height: 1; width: 26px; text-align: center; flex-shrink: 0; }
  .m-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 600; letter-spacing: .2px;
    color: var(--text); flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .m-name.tbd-name {
    color: var(--muted); font-weight: 400; font-size: 16px;
  }
  /* Score per team */
  .m-score-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 700; letter-spacing: -.5px;
    color: var(--text); min-width: 22px; text-align: right;
    margin-left: 4px;
  }
  .m-score-val.winner-score { color: #fff; }
  .m-score-val.loser-score  { color: var(--muted); font-weight: 400; }

  /* Divider between teams */
  .m-divider {
    height: 1px; background: var(--border); margin: 4px 0 4px 34px;
  }

  /* ── MATCH RIGHT (channel) ── */
  .m-right {
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: flex-start; padding-left: 10px; padding-top: 2px;
  }
  .m-ch {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .5px;
    padding: 3px 8px; border-radius: 3px; white-space: nowrap;
  }
  .ch-FOX { background: var(--fox); color: #fff; }
  .ch-FS1 { background: var(--fs1); color: #fff; }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center; padding: 16px;
    font-size: 11px; color: var(--muted);
    border-top: 1px solid var(--border);
  }

  /* ── LOADING SKELETON ── */
  .skeleton-wrap { padding: 16px; }
  .skel {
    height: 72px; border-radius: var(--r);
    margin-bottom: 4px;
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ── BOTTOM SHEET ── */
  .sheet-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%; max-width: 500px;
    background: #1a1f27;
    border-radius: 18px 18px 0 0;
    padding: 0 0 env(safe-area-inset-bottom,16px);
    overflow: hidden;
    animation: slide-up .22s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,.2);
    margin: 10px auto 0;
  }
  .sheet-match {
    padding: 14px 20px 10px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .sheet-teams {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px; font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .sheet-vs { font-size: 13px; color: var(--muted); font-weight: 400; }
  .sheet-meta {
    font-size: 12px; color: var(--muted); margin-top: 3px;
    font-family: 'Barlow', sans-serif;
  }
  .sheet-actions { padding: 10px 16px 6px; display: flex; flex-direction: column; gap: 8px; }
  .sheet-btn {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-radius: 12px;
    border: none; cursor: pointer; text-align: left; width: 100%;
    text-decoration: none; transition: opacity .12s;
    font-family: 'Barlow', sans-serif;
  }
  .sheet-btn:active { opacity: .75; }
  .sheet-btn-icon {
    width: 42px; height: 42px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .sheet-btn-text { display: flex; flex-direction: column; gap: 1px; }
  .sheet-btn-label { font-size: 15px; font-weight: 500; }
  .sheet-btn-sub   { font-size: 12px; opacity: .6; }
  .btn-fox { background: #1e3a6e; }
  .btn-fox .sheet-btn-icon { background: var(--fox); }
  .btn-fox .sheet-btn-label { color: #fff; }
  .btn-fox .sheet-btn-sub { color: rgba(255,255,255,.7); }
  .btn-fs1 { background: #1a3524; }
  .btn-fs1 .sheet-btn-icon { background: var(--fs1); }
  .btn-fs1 .sheet-btn-label { color: #fff; }
  .btn-fs1 .sheet-btn-sub { color: rgba(255,255,255,.7); }
  .btn-web { background: var(--surface2); }
  .btn-web .sheet-btn-icon { background: rgba(255,255,255,.08); }
  .btn-web .sheet-btn-label { color: var(--text); }
  .btn-web .sheet-btn-sub { color: var(--muted); }
  .sheet-cancel {
    margin: 2px 16px 8px; padding: 14px;
    background: var(--surface2); border: none; border-radius: 12px;
    color: var(--muted); font-size: 15px; font-family: 'Barlow', sans-serif;
    font-weight: 500; cursor: pointer; width: calc(100% - 32px);
    transition: opacity .12s;
  }
  .sheet-cancel:active { opacity: .7; }
  .match { cursor: pointer; }

  /* ── RESPONSIVE ── */
  @media (max-width: 380px) {
    .day-block { padding: 0 10px; }
    .dh-date, .dh-month { font-size: 20px; }
    .dh-weekday { font-size: 13px; }
    .m-name { font-size: 16px; }
    .m-score-val { font-size: 20px; }
    .match-stack { gap: 5px; padding-top: 5px; }
    .match { padding: 12px 11px; }
  }



  /* ── REFRESH FAB ── */
  #refresh-fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    right: 20px;
    z-index: 100;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.45), 0 0 0 1px rgba(232,200,74,0.3);
    transition: transform .15s, box-shadow .15s, background .15s;
    -webkit-tap-highlight-color: transparent;
  }
  #refresh-fab:hover  { transform: scale(1.08); box-shadow: 0 6px 24px rgba(0,0,0,0.55); }
  #refresh-fab:active { transform: scale(0.93); }
  #refresh-fab:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  #refresh-fab.fetching { background: var(--surface2); border: 1.5px solid var(--accent); }
  #refresh-fab .fab-icon { display: inline-block; color: #000; transition: color .15s; }
  #refresh-fab.fetching .fab-icon { animation: spin 0.9s linear infinite; color: var(--accent); }

  /* ── FETCH BUTTON ── */
  #fetch-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 99px;
    padding: 5px 11px;
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .3px;
    color: var(--muted);
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #fetch-btn:hover { border-color: rgba(255,255,255,.25); color: var(--text); }
  #fetch-btn:disabled { opacity: .4; cursor: not-allowed; }
  #fetch-btn.fetching { border-color: var(--accent); color: var(--accent); }
  #fetch-btn.fetching .fetch-icon { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fetch-icon { font-size: 13px; line-height: 1; }
  /* ── SPOILER TOGGLE ── */
  .spoiler-toggle {
    display: flex; align-items: center; gap: 7px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 99px;
    padding: 5px 10px 5px 7px;
    cursor: pointer;
    user-select: none;
    transition: border-color .15s;
    flex-shrink: 0;
  }
  .spoiler-toggle:hover { border-color: rgba(255,255,255,.25); }
  .spoiler-toggle.scores-on {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  /* the actual switch track */
  .st-track {
    width: 30px; height: 17px; border-radius: 99px;
    background: var(--border2);
    position: relative; flex-shrink: 0;
    transition: background .2s;
  }
  .spoiler-toggle.scores-on .st-track { background: var(--accent); }
  /* thumb */
  .st-thumb {
    position: absolute; top: 2px; left: 2px;
    width: 13px; height: 13px; border-radius: 50%;
    background: #fff;
    transition: transform .2s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .spoiler-toggle.scores-on .st-thumb { transform: translateX(13px); }
  .st-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 600; letter-spacing: .3px;
    color: var(--muted); white-space: nowrap;
    transition: color .15s;
  }
  .spoiler-toggle.scores-on .st-label { color: var(--accent); }

  /* ── SPOILER PROTECTION: scores hidden ────────────────────────────────────
     Goal: a finished match must look IDENTICAL to an upcoming one.
     Every visual tell — score numbers, winner highlight, dim, strikethrough,
     FT badge, left bar color — is suppressed until the user turns scores on.
  ── */

  /* 1. Completely hide score numbers (no blur — layout shift is a tell) */
  body:not(.show-scores) .m-score-val {
    visibility: hidden;
    width: 0; min-width: 0; padding: 0; margin: 0;
    overflow: hidden;
  }

  /* 2. State chip (live/ft/upcoming) is always visible — never hidden */
  /* score numbers are hidden, not the state indicator */

  /* 3. Winner/loser name coloring — force both teams to look identical */
  body:not(.show-scores) .m-name.winner-name {
    color: var(--text);
    font-weight: 600; /* same as normal */
  }
  body:not(.show-scores) .m-score-val.winner-score,
  body:not(.show-scores) .m-score-val.loser-score {
    color: var(--text);
    font-weight: 700;
  }

  /* 4. Dimming of finished rows is ALWAYS on — it signals "past game"
        without revealing any score information. Only score numbers
        and winner/loser coloring are gated by the toggle. */

  /* 5. Kickoff time — no special treatment when scores hidden (handled by body.show-scores rule) */

  /* 6. USA left bar stays green always (not a score tell) — no override needed */

  /* 7. Hide score line in the bottom sheet */
  body:not(.show-scores) .sheet-score { display: none; }
</style>
</head>

function normalizeName(n) {
  if (!n) return '';
  return n.trim()
    .replace(/Türkiye|Turkey/i, 'Türkiye')
    .replace(/Côte d'Ivoire|Ivory Coast/i, 'Ivory Coast')
    .replace(/Bosnia[- &]+Herzegovina/i, 'Bosnia and Herzegovina')
    .replace(/DR Congo|Congo DR/i, 'Congo DR')
    .replace(/Czech Republic/i, 'Czechia')
    .replace(/Korea Republic|South Korea/i, 'South Korea')
    .replace(/Curaçao|Curacao/i, 'Curaçao')
    .replace(/United States|USA/i, 'USA');
}

function scoreKey(t1, t2, date) {
  return `${normalizeName(t1)} v ${normalizeName(t2)} ${date}`;
}

function applyKnownResults() {
  KNOWN_RESULTS.forEach(r => {
    const key = scoreKey(r.t1, r.t2, r.date);
    const winner = r.score1 > r.score2 ? normalizeName(r.t1)
                 : r.score2 > r.score1 ? normalizeName(r.t2) : null;
    // Only set if not already populated by a live fetch
    if (!scores[key]) {
      scores[key] = { score1: r.score1, score2: r.score2, winner, status: 'FT' };
    }
  });
}

// ── CLAUDE-POWERED SCORE FETCH ────────────────────────────────────────────────
// Calls the Anthropic API with web search to get current WC scores.
// Falls back to openfootball JSON, then to KNOWN_RESULTS.

async function fetchScoresFromClaude() {
  const btn = document.getElementById('fetch-btn');
  const fetchLabel = document.getElementById('fetch-label');
  btn.disabled = true;
  btn.classList.add('fetching');
  fetchLabel.textContent = 'Fetching…';
  setSyncState('loading');
  applyKnownResults();

  // Build the list of fixtures that should have scores by now
  const today = new Date();
  const pdtOffset = -7 * 60;
  const nowPDT = new Date(today.getTime() + (today.getTimezoneOffset() + pdtOffset) * 60000);
  const todayStr = nowPDT.toISOString().slice(0,10);

  const played = FIXTURES.filter(f =>
    f.t1 !== 'TBD' && f.t2 !== 'TBD' && f.date <= todayStr
  ).map(f => `${f.t1} vs ${f.t2} on ${f.date}`).join('\n');

  const prompt = `You are a sports data assistant. Today is ${todayStr}.

Search the web for FIFA World Cup 2026 results and return ONLY a JSON array of completed matches.
Each object must have exactly these fields:
  t1 (team 1 name), t2 (team 2 name), date (YYYY-MM-DD), score1 (integer), score2 (integer)

Only include matches that have fully completed (Final Score / FT).
Use the exact team names as listed:
${played}

Return ONLY valid JSON array, no markdown, no explanation. Example:
[{"t1":"Mexico","t2":"South Africa","date":"2026-06-11","score1":2,"score2":0}]`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();

    // Extract text blocks (after tool use)
    const text = data.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('');

    // Parse JSON — strip any accidental markdown fences
    const clean = text.replace(/```json|```/g, '').trim();
    const results = JSON.parse(clean);

    if (!Array.isArray(results)) throw new Error('Not an array');

    let count = 0;
    results.forEach(r => {
      const t1 = normalizeName(r.t1);
      const t2 = normalizeName(r.t2);
      const key = scoreKey(t1, t2, r.date);
      const winner = r.score1 > r.score2 ? t1 : r.score2 > r.score1 ? t2 : null;
      scores[key] = { score1: r.score1, score2: r.score2, winner, status: 'FT' };
      count++;
    });

    setSyncState('ok', count);
    fetchLabel.textContent = `${count} result${count !== 1 ? 's' : ''} found`;
    setTimeout(() => { fetchLabel.textContent = 'Fetch scores'; }, 4000);

  } catch (e) {
    console.warn('Claude fetch failed, trying openfootball…', e);
    await fetchFromOpenfootball();
  } finally {
    btn.disabled = false;
    btn.classList.remove('fetching');
    render();
  }
}

async function fetchFromOpenfootball() {
  const OF_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
  try {
    const res = await fetch(OF_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const allMatches = data.matches || [];
    let count = 0;
    allMatches.forEach(m => {
      const t1 = normalizeName(m.team1?.name || m.team1 || '');
      const t2 = normalizeName(m.team2?.name || m.team2 || '');
      if (!t1 || !t2 || !m.date) return;
      const key = scoreKey(t1, t2, m.date);
      const s = m.score || m.result || {};
      const ft = s.ft || s.score || null;
      if (ft && Array.isArray(ft) && ft.length === 2) {
        const winner = ft[0] > ft[1] ? t1 : ft[1] > ft[0] ? t2 : null;
        scores[key] = { score1: ft[0], score2: ft[1], winner, status: 'FT' };
        count++;
      }
    });
    setSyncState('ok', count);
    document.getElementById('fetch-label').textContent = 'Fetch scores';
  } catch (e) {
    setSyncState('ok', 0);
    document.getElementById('fetch-label').textContent = 'Fetch scores';
  }
}

async function fetchScores() {
  // On auto-refresh just use the lighter openfootball fetch + known results
  applyKnownResults();
  await fetchFromOpenfootball();
  render();
}

function setSyncState(state, liveCount) {
  const dot   = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (state === 'loading') {
    label.textContent = 'Updating…';
  } else if (state === 'ok') {
    dot.classList.add('ok');
    label.textContent = liveCount > 0 ? 'Live data' : 'Results in';
  } else if (state === 'error') {
    label.textContent = 'Offline';
  }
}

// ─────────────────────────────────────────────

const PHASE_LABELS = { group:'Group Stage', r32:'Round of 32', r16:'Round of 16', qf:'Quarterfinals', sf:'Semifinals', '3rd':'3rd Place', final:'Final' };
const PHASE_ORDER  = ['group','r32','r16','qf','sf','3rd','final'];

function todayPDT() {
  const now = new Date();
  const pdtOffset = -7 * 60;
  const pdt = new Date(now.getTime() + (now.getTimezoneOffset() + pdtOffset) * 60000);
  return pdt.toISOString().slice(0,10);
}

function dayHeaderHtml(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const isToday = dateStr === todayPDT();
  const weekday = d.toLocaleDateString('en-US', { weekday: 'long' });
  const day   = d.getDate();
  const month = d.toLocaleDateString('en-US', { month: 'long' }).toUpperCase();
  const cls  = isToday ? ' today' : '';
  const chip = isToday ? '<span class="today-chip">Today</span>' : '';
  return `<div class="day-header${cls}">
    <div class="dh-line">
      <span class="dh-month">${month}</span>
      <span class="dh-date">${day}</span>
      <span class="dh-weekday">(${weekday})</span>
    </div>
    ${chip}
  </div>`;
}

function getScore(m) {
  const k = scoreKey(m.t1, m.t2, m.date);
  return scores[k] || null;
}

function isLiveNow(m) {
  const now = new Date();
  const pdtOffset = -7 * 60;
  const nowPDT = new Date(now.getTime() + (now.getTimezoneOffset() + pdtOffset) * 60000);
  const todayStr = nowPDT.toISOString().slice(0,10);
  if (m.date !== todayStr) return false;
  if (getScore(m)) return false;
  const [hr, min] = m.pdt.replace(/ (am|pm)/,'').split(':').map(Number);
  const isPM = m.pdt.includes('pm') && hr !== 12;
  const kickoffH = isPM ? hr + 12 : hr;
  const kickoffMins = kickoffH * 60 + min;
  const nowMins = nowPDT.getHours() * 60 + nowPDT.getMinutes();
  return nowMins >= kickoffMins && nowMins <= kickoffMins + 120;
}

function matchHtml(m) {
  const sc   = getScore(m);
  const live = isLiveNow(m);
  const isTBD = m.t1 === 'TBD' || m.t2 === 'TBD';

  // Row class
  let cls = 'match';
  if (m.usa)  cls += ' usa';
  if (live)   cls += ' live-now';
  if (sc)     cls += ' finished';

  // State chip — always visible, never hidden by spoiler toggle
  let stateChip = '';
  if (live)    stateChip = `<span class="m-state state-live">● LIVE</span>`;
  else if (sc) stateChip = `<span class="m-state state-ft">Final</span>`;
  else         stateChip = `<span class="m-state state-upcoming"></span>`;

  // USA tag shown alongside state (only for group stage USA games)
  const usaTag = m.usa ? `<span class="m-pill-usa">🇺🇸 USA</span>` : '';

  const kickoffHtml = `<span class="m-kickoff">${m.pdt} PDT</span>`;
  const sep = '<span class="m-sep">·</span>';
  const groupTagInline = m.group
    ? `${sep}<span class="m-group-tag">Group ${m.group}</span>`
    : '';
  const venueTagInline = m.venue
    ? `${sep}<span class="m-venue-tag">${m.venue}</span>`
    : '';

  // Per-team score values
  const f1 = flag(m.t1), f2 = flag(m.t2);
  const flag1 = f1 ? `<span class="m-flag">${f1}</span>` : `<span class="m-flag"></span>`;
  const flag2 = f2 ? `<span class="m-flag">${f2}</span>` : `<span class="m-flag"></span>`;

  let score1Html = '', score2Html = '', name1ExtraCls = '', name2ExtraCls = '';
  if (sc) {
    const w1 = sc.winner === m.t1;
    const w2 = sc.winner === m.t2;
    score1Html = `<span class="m-score-val ${w1 ? 'winner-score' : 'loser-score'}">${sc.score1}</span>`;
    score2Html = `<span class="m-score-val ${w2 ? 'winner-score' : 'loser-score'}">${sc.score2}</span>`;
    // winner-name added to team name spans so CSS can suppress the highlight when scores hidden
    if (w1) name1ExtraCls = ' winner-name';
    if (w2) name2ExtraCls = ' winner-name';
  }

  const name1cls = isTBD && m.t1 === 'TBD' ? ' tbd-name' : '';
  const name2cls = isTBD && m.t2 === 'TBD' ? ' tbd-name' : '';

  // groupTag and venueTag now inlined in m-info-row

  return `<div class="${cls}" data-id="${m.id}">
    <div class="m-body">
      <div class="m-info-row">${stateChip}${usaTag}${kickoffHtml}${groupTagInline}${venueTagInline}</div>
      <div class="m-team-row">
        ${flag1}
        <span class="m-name${name1cls}${name1ExtraCls}">${m.t1}</span>
        ${score1Html}
      </div>
      <div class="m-divider"></div>
      <div class="m-team-row">
        ${flag2}
        <span class="m-name${name2cls}${name2ExtraCls}">${m.t2}</span>
        ${score2Html}
      </div>
    </div>
    <div class="m-right">
      <span class="m-ch ch-${m.ch}">${m.ch}</span>
    </div>
  </div>`;
}

function render() {
  const filtered = FIXTURES.filter(m => {
    if (activePhase === 'usa') return m.usa;
    if (activePhase !== 'all' && m.phase !== activePhase) return false;
    if (searchText) {
      const q = searchText.toLowerCase();
      return m.t1.toLowerCase().includes(q) ||
             m.t2.toLowerCase().includes(q) ||
             m.venue.toLowerCase().includes(q) ||
             (m.group||'').toLowerCase().includes(q);
    }
    return true;
  });

  document.getElementById('count-badge').textContent =
    filtered.length + ' match' + (filtered.length !== 1 ? 'es' : '');

  // Group by phase → date string (for stable sort)
  const byPhase = {};
  filtered.forEach(m => {
    if (!byPhase[m.phase]) byPhase[m.phase] = {};
    if (!byPhase[m.phase][m.date]) byPhase[m.phase][m.date] = [];
    byPhase[m.phase][m.date].push(m);
  });

  let html = '';
  PHASE_ORDER.forEach(ph => {
    if (!byPhase[ph]) return;
    const PHASE_META = {
      group: { eyebrow: 'FIFA World Cup 2026', icon: '⚽' },
      r32:   { eyebrow: 'Knockout Stage',       icon: '🏆' },
      r16:   { eyebrow: 'Knockout Stage',       icon: '🏆' },
      qf:    { eyebrow: 'Knockout Stage',       icon: '🏆' },
      sf:    { eyebrow: 'Knockout Stage',       icon: '🏆' },
      '3rd': { eyebrow: 'Knockout Stage',       icon: '🥉' },
      final: { eyebrow: 'Knockout Stage',       icon: '🥇' },
    };
    const meta = PHASE_META[ph] || { eyebrow: '', icon: '' };
    html += `<div class="phase-block">
      <div class="phase-label">
        <span class="phase-label-eyebrow">${meta.eyebrow}</span>
        <div class="phase-label-bottom">
          <span class="phase-label-title">${PHASE_LABELS[ph]}</span>
          <span class="phase-label-icon">${meta.icon}</span>
        </div>
      </div>`;
    Object.keys(byPhase[ph]).sort().forEach(date => {
      html += `<div class="day-block" data-date="${date}">${dayHeaderHtml(date)}<div class="match-stack">`;
      byPhase[ph][date].forEach(m => { html += matchHtml(m); });
      html += '</div></div>';
    });
    html += '</div>';
  });

  if (!html) html = '<div class="empty">No matches found.</div>';
  document.getElementById('main').innerHTML = html;
}

// Adds .is-pinned when a phase label hits the sticky position,
// switching it to a compact form so it doesn't eat too much screen real estate.
function initStickyPhaseLabels() {
  const CONTROLS_HEIGHT = 98; // header (~49px) + controls bar (~49px)
  const labels = document.querySelectorAll('.phase-label');
  if (!labels.length) return;

  const observer = new IntersectionObserver(
    entries => {
      entries.forEach(entry => {
        // When less than 100% visible from the top, it's pinned
        entry.target.classList.toggle('is-pinned', !entry.isIntersecting);
      });
    },
    {
      rootMargin: `-${CONTROLS_HEIGHT + 1}px 0px 0px 0px`,
      threshold: 1.0
    }
  );

  labels.forEach(label => observer.observe(label));
}

// Re-init after every render since labels are recreated by innerHTML
const _origRender = render;
render = function() {
  _origRender();
  requestAnimationFrame(() => {
    initStickyPhaseLabels();
    // Auto-scroll only on first render (page load / hard reload)
    if (!hasAutoScrolled) {
      hasAutoScrolled = true;
      scrollToToday();
    }
  });
};

// ── DYNAMIC STICKY OFFSET ─────────────────────────────────────────────────────
// Measure actual header + controls height so phase labels stick at the right spot
// regardless of pill wrapping or font scaling on mobile.
function updateStickyOffset() {
  const hdr  = document.querySelector('header');
  const ctrl = document.querySelector('.controls');
  const mainEl = document.getElementById('main');
  if (!hdr || !ctrl || !mainEl) return;
  const hdrH  = hdr.getBoundingClientRect().height;
  const ctrlH = ctrl.getBoundingClientRect().height;
  // Keep controls pinned directly below header
  ctrl.style.top = hdrH + 'px';
  // Push main content below both fixed bars
  mainEl.style.paddingTop = (hdrH + ctrlH + 8) + 'px';
  // Update phase label sticky offset
  document.documentElement.style.setProperty('--sticky-phase-top', (hdrH + ctrlH) + 'px');
}
updateStickyOffset();
window.addEventListener('resize', updateStickyOffset);


// ── SCROLL TO TODAY ───────────────────────────────────────────────────────────
// On load and after render, scroll to the first day that is today or in the future.
// Skips if the user has already scrolled (only runs on fresh load / filter reset).
let hasAutoScrolled = false;

function scrollToToday() {
  const todayStr = todayPDT();
  // Get all day blocks sorted by date
  const blocks = Array.from(document.querySelectorAll('.day-block[data-date]'));
  if (!blocks.length) return;

  // Find first block whose date >= today
  const target = blocks.find(b => b.dataset.date >= todayStr);
  if (!target) return; // tournament is over — don't scroll

  // Measure the fixed header height so we don't scroll under it
  const hdr  = document.querySelector('header');
  const ctrl = document.querySelector('.controls');
  const offset = (hdr  ? hdr.getBoundingClientRect().height  : 49)
               + (ctrl ? ctrl.getBoundingClientRect().height : 49)
               + 8; // small breathing room

  const top = target.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
}


</script>
